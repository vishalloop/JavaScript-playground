<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game By Vishal Raj ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="snake-head.png">
</head>
<body>
    <section>
        <div class="infos">
            <div class="high-score info">High Score: <span id="high-score">0</span></div>
            <div class="score info">Score: <span id="score"></span></div>
            <div class="time info">Time: <span id="time">00-00</span></div>
        </div>
        <div class="game-box"></div>
        <div class="modals">
        <div class="start-game modal">
            <p>Start The Snake Game 🐍</p>
            <button id="start">Start Game</button>
            Crafted By Vishal Raj with a ❤️

        </div>
        <div class="game-over modal">
            </p> Game Over 🐍</p>
            <button id="over">Restart Game</button>
            Crafted By Vishal Raj with a ❤️
        </div>
    </div>
    </section> 

    
    <script src="script.js"></script>
</body>
</html>
